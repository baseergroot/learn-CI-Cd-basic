name: Deploy to Azure VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/workspace/learn-CI-Cd-basic
            
            git pull origin main --rebase
            
            # Load nvm environment (this is the key fix)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Extra safety: add nvm bin to PATH
            export PATH="$NVM_DIR/versions/node/v24.14.1/bin:$PATH"
            
            pnpm install --frozen-lockfile
            pnpm build
            
            # Restart PM2 with built app (fallback if not exists)
            pm2 restart ci/cd-app || pm2 start dist/index.js --name "ci/cd-app"
            
            pm2 save
            
            echo "✅ Deployment completed successfully at $(date)"